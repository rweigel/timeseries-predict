# All paths are relative to run.py.
job_script: ./configs/swerve/job_script.py

data:
  data_directory: ./data/raw/SWERVE
  event: 2024-05-10

inputs: [bx,by,bz]
outputs: [gic]


# Neural network hyperparameters
nn:
  dtype: float32
  n_epochs: 100
  num_reps: 1
  batch_size: 256
  hidden_size: 32
  activation: Tanh
  optimizer: Adam
  optimizer_kwargs:
    lr: 0.01
