# All paths are relative to main.py.

# User-defined script for loading data. Must contain a function job_list(config)
job_script: ./configs/demo/job_script.py

# The following are set in demo-0.yaml
data:

job: null

base_dir: ./data/results/demo

parallel_jobs: false

# True => [None, **outputs]; null or no attribute => Only use all inputs
removed_inputs: false
inputs: [input1]
outputs: [output1]

n_reps: 2

train_fraction: 0.8

models:
  - ols
  - nn_mimo
  - nn_mimo_resid
  - nn_miso
  - nn_miso_resid

# Neural network hyperparameters
nn:
  # device sets training parallelization using one of
  #   null
  #   cpu (default if device is null)
  #   gpu (Linux/Windows)
  #   mps (OS-X)
  n_epochs: 2
  dtype: float32
  batch_size: 256
  hidden_size: 32
  activation: Tanh
  optimizer: Adam
  optimizer_kwargs:
    lr: 0.01
